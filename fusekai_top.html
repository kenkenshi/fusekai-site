<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>けんしの腐世界生活</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #faf8f6;
  color: #1a1018;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

/* hero */
.hero {
  padding: 3rem 1.5rem 2rem;
  text-align: center;
  background: #faf8f6;
  border-bottom: 1px solid rgba(220,180,200,0.25);
}
.logo-img {
  width: min(340px, 88vw);
  height: auto;
  display: block;
  margin: 0 auto 0.8rem;
}
.copy {
  font-size: 0.82rem;
  color: #7a6070;
  line-height: 1.9;
  letter-spacing: 0.02em;
  max-width: 400px;
  margin: 0 auto 0.5rem;
}

/* search */
.search-wrap {
  max-width: 460px;
  margin: 1.4rem auto 0.4rem;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2.8rem;
  border: 1.5px solid rgba(220,180,200,0.5);
  border-radius: 999px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  color: #1a1018;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: #d4a0b8; }
.search-wrap input::placeholder { color: #b8a0b0; }
.search-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: #c8a0b8;
  font-size: 0.95rem;
  pointer-events: none;
}
.search-label {
  font-size: 0.7rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.15em;
  margin-top: 0.4rem;
  text-align: center;
}

/* CTA buttons */
.cta-section {
  max-width: 460px;
  margin: 2rem auto 0;
  padding: 0 0 0.5rem;
}
.cta-label {
  font-size: 0.72rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.2em;
  text-align: center;
  margin-bottom: 0.9rem;
}
.cta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin-bottom: 0.6rem;
}
.cta-btn {
  display: block;
  padding: 0.85rem 0.5rem;
  border: 1.5px solid rgba(220,180,200,0.55);
  border-radius: 999px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  color: #4a3048;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.05em;
}
.cta-btn:hover {
  border-color: #d4a0b8;
  background: #fdf0f5;
}
.cta-btn-full {
  width: 100%;
  padding: 0.85rem;
  border: 1.5px solid rgba(220,180,200,0.55);
  border-radius: 999px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  color: #4a3048;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: block;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.05em;
}
.cta-btn-full:hover {
  border-color: #d4a0b8;
  background: #fdf0f5;
}

/* profile */
.profile-section {
  max-width: 460px;
  margin: 0 auto;
  padding: 1.8rem 1.5rem 0;
}
.profile-link {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  color: #4a3048;
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  padding: 0.6rem 0;
  border-top: 1px solid rgba(220,180,200,0.25);
}
.profile-link::after {
  content: '›';
  margin-left: auto;
  color: #c8a0b8;
  font-size: 1.1rem;
}
.profile-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #d4a0b8;
  flex-shrink: 0;
}

/* topics */
.topics-section {
  max-width: 460px;
  margin: 0 auto;
  padding: 2rem 1.5rem 3rem;
}
.topics-heading {
  font-size: 0.72rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.25em;
  margin-bottom: 0.9rem;
  text-align: center;
}
.topics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
}
.topic-card {
  border: 1px solid rgba(220,180,200,0.35);
  border-radius: 10px;
  padding: 1.1rem 0.7rem;
  background: #fff;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
}
.topic-card:hover { border-color: #d4a0b8; }
.topic-icon {
  font-size: 1.3rem;
  margin-bottom: 0.5rem;
  display: block;
}
.topic-text {
  font-size: 0.72rem;
  color: #6a5060;
  line-height: 1.5;
  letter-spacing: 0.03em;
}
.topic-badge {
  display: inline-block;
  font-size: 0.6rem;
  font-family: 'DM Mono', monospace;
  color: #c8a0b8;
  letter-spacing: 0.1em;
  margin-top: 0.3rem;
}

/* ===== 検索結果エリア ===== */
#search-results {
  max-width: 460px;
  margin: 0 auto;
  padding: 0 1.5rem 2rem;
  display: none;
}
#search-results.visible { display: block; }
.results-label {
  font-size: 0.7rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
  text-align: center;
}
.bl-card {
  display: flex;
  gap: 0.9rem;
  background: #fff;
  border: 1px solid rgba(220,180,200,0.35);
  border-radius: 12px;
  padding: 0.9rem;
  margin-bottom: 0.7rem;
  transition: border-color 0.2s;
}
.bl-card:hover { border-color: #d4a0b8; }
.bl-card-img {
  width: 60px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
  background: #f0e8ee;
}
.bl-card-img-placeholder {
  width: 60px;
  height: 80px;
  border-radius: 6px;
  background: linear-gradient(135deg, #f5e6ef, #e8d8e8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.bl-card-info { flex: 1; min-width: 0; }
.bl-card-title {
  font-size: 0.88rem;
  font-weight: 500;
  color: #2a1828;
  margin-bottom: 0.15rem;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bl-card-author {
  font-size: 0.72rem;
  color: #9a7888;
  margin-bottom: 0.4rem;
  letter-spacing: 0.03em;
}
.bl-card-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 0.4rem;
}
.bl-card-volume {
  font-size: 0.68rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
}
.bl-card-video-badge {
  font-size: 0.6rem;
  padding: 0.15rem 0.5rem;
  background: #fdf0f5;
  border: 1px solid #e8c0d0;
  border-radius: 999px;
  color: #c87098;
  font-family: 'DM Mono', monospace;
}
.bl-card-memo {
  font-size: 0.72rem;
  color: #6a5060;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.bl-card-unread {
  background: #faf8f6;
  border: 1px dashed rgba(220,180,200,0.5);
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 0.7rem;
  text-align: center;
}
.bl-card-unread-title {
  font-size: 0.85rem;
  font-weight: 500;
  color: #4a3048;
  margin-bottom: 0.3rem;
}
.bl-card-unread-msg {
  font-size: 0.72rem;
  color: #b8a0b0;
  line-height: 1.6;
  margin-bottom: 0.7rem;
}
.bl-card-unread-btn {
  display: inline-block;
  padding: 0.5rem 1.2rem;
  border: 1.5px solid rgba(220,180,200,0.6);
  border-radius: 999px;
  background: #fff;
  font-size: 0.75rem;
  color: #4a3048;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s, background 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.bl-card-unread-btn:hover { border-color: #d4a0b8; background: #fdf0f5; }
.search-loading {
  text-align: center;
  padding: 1.5rem 0;
  font-size: 0.78rem;
  color: #b8a0b0;
  font-family: 'DM Mono', monospace;
}
.search-no-result {
  text-align: center;
  padding: 1.5rem 0;
  font-size: 0.78rem;
  color: #b8a0b0;
  line-height: 1.8;
}

/* ===== 腐レゼントセクション ===== */
.present-section {
  max-width: 460px;
  margin: 0 auto;
  padding: 0 1.5rem 0.5rem;
}
.present-inner {
  background: #fff;
  border: 1px solid rgba(220,180,200,0.4);
  border-radius: 12px;
  padding: 1.2rem 1.4rem;
  text-align: center;
}
.present-title {
  font-size: 0.85rem;
  font-weight: 500;
  color: #4a3048;
  margin-bottom: 0.7rem;
  letter-spacing: 0.05em;
}
.present-address {
  font-size: 0.88rem;
  color: #2a1828;
  font-weight: 500;
  margin-bottom: 0.8rem;
  letter-spacing: 0.03em;
}
.present-note {
  font-size: 0.7rem;
  color: #9a7888;
  line-height: 1.8;
}

/* ===== SNSセクション ===== */
.sns-section {
  display: flex;
  justify-content: center;
  gap: 1.2rem;
  padding: 1.8rem 0 2.5rem;
}
.sns-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(220,180,200,0.4);
  background: #fff;
  color: #9a7888;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.sns-btn:hover {
  border-color: #d4a0b8;
  color: #c87098;
  background: #fdf0f5;
}

/* ===== カードアクションボタン ===== */
.bl-card-wrapper {
  margin-bottom: 0.7rem;
}
.bl-card-wrapper .bl-card {
  margin-bottom: 0;
  border-radius: 12px 12px 0 0;
  flex-direction: column;
}
.bl-card-wrapper .bl-card.no-form-open {
  border-radius: 12px;
}
.bl-card-inner {
  display: flex;
  gap: 0.9rem;
  width: 100%;
}
.card-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.6rem;
}
.action-btn {
  padding: 0.35rem 0.9rem;
  border-radius: 999px;
  font-size: 0.72rem;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  border: 1.5px solid rgba(220,180,200,0.6);
  background: #fff;
  color: #4a3048;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.03em;
}
.action-btn:hover { border-color: #d4a0b8; background: #fdf0f5; }
.recommend-btn { }
.talk-btn { }

/* ===== 語りたいフォーム ===== */
.talk-form {
  background: #fdf8fb;
  border: 1px solid rgba(220,180,200,0.4);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 1rem;
  margin-bottom: 0.7rem;
}
.talk-form-label {
  font-size: 0.72rem;
  color: #9a7888;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.talk-check-group {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
}
.talk-check {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  color: #4a3048;
  cursor: pointer;
}
.talk-check input { accent-color: #d4a0b8; }
.talk-input {
  width: 100%;
  padding: 0.55rem 0.8rem;
  border: 1px solid rgba(220,180,200,0.5);
  border-radius: 8px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem;
  color: #1a1018;
  outline: none;
  margin-bottom: 0.6rem;
}
.talk-input::placeholder { color: #c8b0c0; }
.talk-textarea {
  width: 100%;
  padding: 0.6rem 0.8rem;
  border: 1px solid rgba(220,180,200,0.5);
  border-radius: 8px;
  background: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.75rem;
  color: #1a1018;
  outline: none;
  resize: vertical;
  min-height: 100px;
  line-height: 1.7;
  margin-bottom: 0.7rem;
}
.talk-textarea::placeholder { color: #c8b0c0; }
.talk-radio-group {
  margin-bottom: 0.8rem;
}
.talk-radios {
  display: flex;
  gap: 1rem;
  margin-top: 0.3rem;
}
.talk-radio {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  color: #4a3048;
  cursor: pointer;
}
.talk-radio input { accent-color: #d4a0b8; }
.talk-terms {
  background: #fff;
  border: 1px solid rgba(220,180,200,0.35);
  border-radius: 8px;
  padding: 0.7rem 0.9rem;
  margin-bottom: 0.8rem;
  font-size: 0.7rem;
  color: #7a6070;
  line-height: 1.8;
}
.talk-terms ul {
  padding-left: 1rem;
  margin: 0.3rem 0 0.5rem;
}
.talk-terms-check {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.72rem;
  color: #4a3048;
  cursor: pointer;
  margin-top: 0.4rem;
}
.talk-terms-check input { accent-color: #d4a0b8; }
.talk-submit-btn {
  width: 100%;
  padding: 0.75rem;
  border: none;
  border-radius: 999px;
  background: #d4a0b8;
  color: #fff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: background 0.2s;
}
.talk-submit-btn:hover { background: #c888a8; }
.talk-submit-btn:disabled { background: #e0c8d4; cursor: default; }

/* ===== 作者別の作品語りたいボタン ===== */
.author-other-section {
  margin-bottom: 0.7rem;
}
.author-other-btn {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px dashed rgba(220,180,200,0.6);
  border-radius: 12px 12px 0 0;
  background: #faf8f6;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.78rem;
  color: #9a7888;
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.03em;
  transition: border-color 0.2s, background 0.2s;
}
.author-other-btn.closed {
  border-radius: 12px;
}
.author-other-btn:hover { border-color: #d4a0b8; background: #fdf0f5; color: #4a3048; }
.author-other-section .talk-form {
  border-top: none;
  border: 1px solid rgba(220,180,200,0.4);
  border-top: none;
}

/* ===== 未ヒット時テンプレ ===== */
.unread-template-icon {
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}
.bl-card-unread .card-actions {
  justify-content: center;
}
</style>
</head>

<script>
// ========================================
// Google Sheets API 設定
// ここにAPIキーを貼り付けてください
// ========================================
const API_KEY = 'AIzaSyCxnFTQaAD-tBWxb8dA7eBtrL3b5NQLvx8';
const SHEET_ID = '17YXkAsB10E5jdWgUQytFS9QoMTcoFUExaLPX-XMe5Nc';
const SHEET_NAME = 'シート1'; // シート名が違う場合は変更してください

let blData = []; // スプレッドシートのデータキャッシュ
let dataLoaded = false;

// スプレッドシートからデータ取得
async function loadSheetData() {
  if (dataLoaded) return;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
  try {
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.values || [];
    // 1行目はヘッダーなのでスキップ
    blData = rows.slice(1).map(r => ({
      title:  r[0] || '',
      author: r[1] || '',
      volume: r[2] || '',
      memo:   r[3] || '',
      video:  r[4] || '',
      imgUrl: r[5] || '',
      source: r[6] || ''
    }));
    dataLoaded = true;
  } catch (e) {
    console.error('データ取得エラー:', e);
  }
}

// 検索実行
async function searchBL() {
  const q = document.getElementById('search-input').value.trim();
  const resultsDiv = document.getElementById('search-results');
  const container = document.getElementById('results-container');
  const label = document.getElementById('results-label');

  if (q.length === 0) {
    resultsDiv.classList.remove('visible');
    return;
  }

  resultsDiv.classList.add('visible');
  container.innerHTML = '<div class="search-loading">検索中...</div>';

  if (!dataLoaded) {
    await loadSheetData();
  }

  const keyword = q.toLowerCase();
  const titleMatched = blData.filter(row => row.title.toLowerCase().includes(keyword));
  const authorOnlyMatched = blData.filter(row =>
    row.author.toLowerCase().includes(keyword) &&
    !row.title.toLowerCase().includes(keyword)
  );
  const hasAuthorMatch = blData.some(row => row.author.toLowerCase().includes(keyword));
  const allMatched = [...titleMatched, ...authorOnlyMatched];

  label.textContent = `"${q}" の検索結果`;
  container.innerHTML = '';

  if (allMatched.length === 0) {
    // どちらもヒットなし
    const noResultDiv = document.createElement('div');
    noResultDiv.className = 'bl-card-unread';
    noResultDiv.innerHTML = `
      <div class="unread-template-icon">🙈</div>
      <div class="bl-card-unread-title">${escapeHtml(q)}</div>
      <div class="bl-card-unread-msg">ごめん！まだおすすめされていない<br>作品/作者さんだ。。</div>
      <div class="card-actions">
        <button class="action-btn recommend-btn" onclick="sendRecommend('${escapeHtml(q)}', '', this)">おすすめ</button>
        <button class="action-btn talk-btn" onclick="toggleTalkForm('no-result-form', this)">語りたい</button>
      </div>
      <div id="no-result-form" class="talk-form" style="display:none">
        ${buildTalkForm(q, '', 'title', 'no-result')}
      </div>
    `;
    container.appendChild(noResultDiv);
    return;
  }

  // カード表示
  allMatched.forEach((row, i) => {
    const formId = `talk-form-${i}`;
    const wrapper = document.createElement('div');
    wrapper.className = 'bl-card-wrapper';

    const card = document.createElement('div');
    card.className = 'bl-card no-form-open';
    card.dataset.formId = formId;

    const imgHtml = row.imgUrl
      ? `<img class="bl-card-img" src="${escapeHtml(row.imgUrl)}" alt="${escapeHtml(row.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholderStyle = row.imgUrl ? 'display:none' : '';
    const videoBadge = (row.video && row.video.trim() !== '')
      ? `<span class="bl-card-video-badge">動画腐教済み</span>`
      : '';
    const defaultCheck = authorOnlyMatched.includes(row) ? 'author' : 'title';

    card.innerHTML = `
      <div class="bl-card-inner">
        ${imgHtml}
        <div class="bl-card-img-placeholder" style="${placeholderStyle}">📖</div>
        <div class="bl-card-info">
          <div class="bl-card-title">${escapeHtml(row.title)}</div>
          <div class="bl-card-author">${escapeHtml(row.author)}</div>
          <div class="bl-card-meta">
            ${row.volume ? `<span class="bl-card-volume">既読 ${escapeHtml(row.volume)}</span>` : ''}
            ${videoBadge}
          </div>
          ${row.memo ? `<div class="bl-card-memo">${escapeHtml(row.memo)}</div>` : ''}
          <div class="card-actions">
            <button class="action-btn recommend-btn" onclick="sendRecommend('${escapeHtml(row.title)}', '${escapeHtml(row.author)}', this)">おすすめ</button>
            <button class="action-btn talk-btn" onclick="toggleTalkForm('${formId}', this)">語りたい</button>
          </div>
        </div>
      </div>
    `;

    const formDiv = document.createElement('div');
    formDiv.id = formId;
    formDiv.className = 'talk-form';
    formDiv.style.display = 'none';
    formDiv.innerHTML = buildTalkForm(row.title, row.author, defaultCheck, i);

    wrapper.appendChild(card);
    wrapper.appendChild(formDiv);
    container.appendChild(wrapper);
  });

  // 作者名でヒットがある場合、「先生の別の作品について語りたい」を追加
  if (hasAuthorMatch) {
    const authorFormId = 'author-other-form';
    const authorSection = document.createElement('div');
    authorSection.className = 'author-other-section';
    authorSection.innerHTML = `
      <button class="author-other-btn closed" onclick="toggleAuthorForm('${authorFormId}', this)">
        ${escapeHtml(q)}先生の別の作品について語りたい →
      </button>
      <div id="${authorFormId}" class="talk-form" style="display:none">
        ${buildTalkForm('', q, 'author', 'author-other')}
      </div>
    `;
    container.appendChild(authorSection);
  }
}

// 語りたいフォームのHTML生成
function buildTalkForm(title, author, defaultCheck, uid) {
  const titleChecked = defaultCheck === 'title' ? 'checked' : '';
  const authorChecked = defaultCheck === 'author' ? 'checked' : '';
  const safeUid = String(uid).replace(/[^a-zA-Z0-9_-]/g, '_');
  return `
    <div class="talk-form-inner">
      <p class="talk-form-label">語りたいのは？</p>
      <div class="talk-check-group">
        <label class="talk-check"><input type="checkbox" id="chk-title-${safeUid}" ${titleChecked}> この作品について</label>
        <label class="talk-check"><input type="checkbox" id="chk-author-${safeUid}" ${authorChecked}> この作者について</label>
        <label class="talk-check"><input type="checkbox" id="chk-both-${safeUid}"> 両方！</label>
      </div>
      <input type="text" class="talk-input" id="radioname-${safeUid}" placeholder="ラジオネーム（任意）">
      <textarea class="talk-textarea" id="body-${safeUid}" placeholder="直接的すぎる性表現は採用できない場合があります（けんしは笑いながら読みますが…）&#10;💡 ポップな造語で表現してみてね！&#10;例：激しいシーン → ベッド壊れる界隈"></textarea>
      <div class="talk-radio-group">
        <p class="talk-form-label">ラジオで使っていいですか？</p>
        <div class="talk-radios">
          <label class="talk-radio"><input type="radio" name="radio-ok-${safeUid}" value="yes"> はい</label>
          <label class="talk-radio"><input type="radio" name="radio-ok-${safeUid}" value="no"> いいえ</label>
        </div>
      </div>
      <div class="talk-terms">
        <p>📋 送信前にご確認ください</p>
        <ul>
          <li>送信内容はラジオ・動画で参考にさせていただく場合があります</li>
          <li>個人が特定される情報は含めないでください</li>
          <li>直接的すぎる性表現は採用できない場合があります（けんしは笑いながら読みますが…）</li>
        </ul>
        <label class="talk-terms-check"><input type="checkbox" id="terms-${safeUid}"> 上記を確認して送信する</label>
      </div>
      <button class="talk-submit-btn" onclick="submitTalk('${escapeHtml(title)}', '${escapeHtml(author)}', '${safeUid}')">送信する</button>
    </div>
  `;
}

// 語りたいフォームのトグル
function toggleTalkForm(formId, btn) {
  const form = document.getElementById(formId);
  if (!form) return;
  const isOpen = form.style.display !== 'none';
  form.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '語りたい' : '語りたい ✕';

  // bl-cardの角丸切り替え
  const card = btn.closest('.bl-card');
  if (card) {
    card.classList.toggle('no-form-open', isOpen);
  }
}

// 作者別フォームのトグル
function toggleAuthorForm(formId, btn) {
  const form = document.getElementById(formId);
  if (!form) return;
  const isOpen = form.style.display !== 'none';
  form.style.display = isOpen ? 'none' : 'block';
  btn.classList.toggle('closed', isOpen);
}

// おすすめボタン（ワンクリック送信）
function sendRecommend(title, author, btn) {
  btn.textContent = 'おすすめ済み ♡';
  btn.disabled = true;
  btn.style.borderColor = '#d4a0b8';
  btn.style.color = '#c87098';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyfS8nV_egG3PEdttzKOPq88-yOB6_fbjAounh4hJEVlWpHlMVGkQkaSi59VOkkBo8/exec';
  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ type: 'recommend', title, author })
  }).catch(() => {});
}

// 語りたいフォーム送信
function submitTalk(title, author, uid) {
  const termsChecked = document.getElementById(`terms-${uid}`)?.checked;
  if (!termsChecked) {
    alert('送信前に規約のチェックをお願いします');
    return;
  }
  const radioName = document.getElementById(`radioname-${uid}`)?.value || '';
  const body = document.getElementById(`body-${uid}`)?.value || '';
  const radioOk = document.querySelector(`input[name="radio-ok-${uid}"]:checked`)?.value || '';

  if (!body.trim()) {
    alert('本文を入力してください');
    return;
  }

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyfS8nV_egG3PEdttzKOPq88-yOB6_fbjAounh4hJEVlWpHlMVGkQkaSi59VOkkBo8/exec';
  const submitBtn = event.target;
  submitBtn.disabled = true;
  submitBtn.textContent = '送信中…';

  const targets = [];
  if (document.getElementById(`chk-title-${uid}`)?.checked) targets.push('この作品');
  if (document.getElementById(`chk-author-${uid}`)?.checked) targets.push('この作者');
  const target = targets.join('・') || '';

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ type: 'talk', title, author, radioName, body, radioOk, target })
  })
  .then(() => {
    submitBtn.textContent = '送信しました！ありがとう 🌸';
  })
  .catch(() => {
    submitBtn.disabled = false;
    submitBtn.textContent = '語りたいを送る';
    alert('送信に失敗しました。もう一度試してみてください。');
  });
}

// 腐レゼントセクションのトグル
function togglePresent() {
  const section = document.getElementById('present-section');
  const isOpen = section.style.display !== 'none';
  section.style.display = isOpen ? 'none' : 'block';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
